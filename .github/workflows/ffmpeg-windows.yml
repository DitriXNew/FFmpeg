# Windows x86_64 counterpart of ffmpeg-macos.yml.
#
# Produces the fully static `ffmpeg.exe` / `ffprobe.exe` bundled by the
# AI Video Translator app on Windows (replacing the runtime BtbN download).
#
# License posture is IDENTICAL to the macOS build (LGPL v2.1):
#   --disable-gpl --disable-nonfree --disable-version3
# and the only statically linked external libraries are BSD-licensed
# (libaom, SVT-AV1, opus) — pinned to the SAME versions as macOS so both
# platforms run the same FFmpeg release with identical CLI behaviour.
#
# Two deliberate differences from the macOS recipe, both required for Windows
# and both LGPL-neutral (native libavcodec code, no extra external libs):
#   1. Native software DECODERS (h264/hevc/vp8/vp9/av1/mpeg4/mjpeg +
#      aac/mp3/ac3/opus/vorbis/flac/alac/pcm) are enabled. macOS offloads input
#      decoding to VideoToolbox; Windows has no such fallback, so the app could
#      not read user video/audio without them.
#   2. The native `aac` ENCODER is enabled — the Windows MP4 dub path muxes
#      `-c:a aac`. macOS never encodes AAC (it uses alac/opus).
#
# Toolchain: mingw-w64 cross-compile on Ubuntu (like BtbN). The exe is linked
# `-static` (libgcc/libstdc++/threads and all deps folded in) so there are no
# sibling DLLs — the same failure class (STATUS_DLL_NOT_FOUND) that pushed the
# app to static builds in the first place.
name: build-ffmpeg-windows-x86_64-lgpl-av1-encoders-opus-flac-alac-aac

on:
  workflow_dispatch:
  push:
    branches: [ master ]

env:
  FFMPEG_TAG: "n8.1.2"
  INSTALL_PREFIX: "${{ github.workspace }}/install"
  DEPS_PREFIX: "${{ github.workspace }}/deps-install"
  CROSS_PREFIX: "x86_64-w64-mingw32-"
  CROSS_HOST: "x86_64-w64-mingw32"

jobs:
  build-x86_64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps (mingw-w64 cross toolchain)
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            mingw-w64 mingw-w64-tools \
            cmake ninja-build pkg-config make nasm yasm \
            autoconf automake libtool git curl ca-certificates \
            wine64
          echo "=== toolchain versions ==="
          x86_64-w64-mingw32-gcc --version | head -1
          x86_64-w64-mingw32-g++ --version | head -1
          nasm --version
          cmake --version | head -1
          # PKG_CONFIG_LIBDIR pins pkg-config to our cross deps only (never host
          # libs); both point at the cross prefix's pkgconfig dir.
          echo "PKG_CONFIG_PATH=$DEPS_PREFIX/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_LIBDIR=$DEPS_PREFIX/lib/pkgconfig" >> "$GITHUB_ENV"

      # -------- libaom (AV1 encoder; static, cross) --------
      - name: Build & install libaom (static)
        run: |
          set -euxo pipefail
          git clone --depth=1 --branch v3.14.1 https://aomedia.googlesource.com/aom
          # aom ships a ready mingw cross toolchain file (defaults CROSS to
          # x86_64-w64-mingw32-), so no hand-written toolchain is needed.
          cmake -S aom -B build-aom \
                -DCMAKE_TOOLCHAIN_FILE="$(pwd)/aom/build/cmake/toolchains/x86_64-mingw-gcc.cmake" \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX="$DEPS_PREFIX" \
                -DBUILD_SHARED_LIBS=OFF \
                -DENABLE_DOCS=OFF -DENABLE_TESTS=OFF -DENABLE_EXAMPLES=OFF -DENABLE_TOOLS=OFF \
                -DENABLE_NASM=ON -DCONFIG_RUNTIME_CPU_DETECT=1
          cmake --build build-aom --parallel
          cmake --install build-aom

          echo "=== libaom installation verification ==="
          ls -la "$DEPS_PREFIX/lib/pkgconfig/" | grep aom || echo "No aom.pc found"
          pkg-config --exists aom && echo "✅ libaom pkg-config OK" || echo "❌ libaom pkg-config failed"

      # -------- SVT-AV1 (AV1 encoder; static, cross) --------
      - name: Build & install SVT-AV1 (static)
        run: |
          set -euxo pipefail
          git clone --depth=1 --branch v4.1.0 https://gitlab.com/AOMediaCodec/SVT-AV1.git
          cmake -S SVT-AV1 -B build-svt \
                -DCMAKE_SYSTEM_NAME=Windows \
                -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
                -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ \
                -DCMAKE_RC_COMPILER=x86_64-w64-mingw32-windres \
                -DCMAKE_ASM_NASM_COMPILER=nasm \
                -DCMAKE_FIND_ROOT_PATH="$DEPS_PREFIX" \
                -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
                -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
                -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX="$DEPS_PREFIX" \
                -DBUILD_SHARED_LIBS=OFF -DBUILD_APPS=OFF -DBUILD_TESTING=OFF
          cmake --build build-svt --parallel
          cmake --install build-svt

          echo "=== SVT-AV1 installation verification ==="
          ls -la "$DEPS_PREFIX/lib/pkgconfig/" | grep -i svt || echo "No SVT pkg-config found"
          pkg-config --exists SvtAv1Enc && echo "✅ SVT-AV1 OK ($(pkg-config --modversion SvtAv1Enc))" || echo "❌ SVT-AV1 pkg-config not found"

      # -------- libopus (audio encoder; static, cross) --------
      - name: Build & install libopus (static)
        run: |
          set -euxo pipefail
          mkdir -p "$DEPS_PREFIX"
          curl -L -o opus.tar.gz https://downloads.xiph.org/releases/opus/opus-1.5.2.tar.gz
          tar -xzf opus.tar.gz
          cd opus-1.5.2
          ./configure --host="$CROSS_HOST" --prefix="$DEPS_PREFIX" \
                      --disable-shared --enable-static CFLAGS="-O3"
          make -j"$(nproc)"
          make install

          pkg-config --exists opus && echo "✅ libopus pkg-config OK ($(pkg-config --modversion opus))"

      # -------- FFmpeg (static, LGPL v2.1, mingw cross) --------
      - name: Build FFmpeg (LGPL, static, AV1 + AAC/Opus/FLAC/ALAC/PCM, software decoders)
        run: |
          set -euxo pipefail
          git clone https://github.com/FFmpeg/FFmpeg ffmpeg-src
          cd ffmpeg-src
          git checkout "$FFMPEG_TAG"

          # Static link flags for the external deps (mirrors macOS recipe).
          AOM_LIBS="$(pkg-config --static --libs aom)"
          OPUS_LIBS="$(pkg-config --static --libs opus)"
          SVT_AV1_LIBS="$(pkg-config --static --libs SvtAv1Enc)"
          echo "AOM_LIBS: $AOM_LIBS"
          echo "OPUS_LIBS: $OPUS_LIBS"
          echo "SVT_AV1_LIBS: $SVT_AV1_LIBS"

          ./configure \
            --prefix="$INSTALL_PREFIX" \
            --arch=x86_64 \
            --target-os=mingw32 \
            --cross-prefix="$CROSS_PREFIX" \
            --enable-cross-compile \
            --pkg-config=pkg-config \
            --pkg-config-flags=--static \
            --disable-gpl --disable-nonfree --disable-version3 \
            --enable-static --disable-shared \
            --enable-w32threads \
            --disable-debug --disable-doc \
            \
            --disable-decoders \
            --disable-encoders \
            \
            --enable-libaom \
            --enable-libsvtav1 \
            --enable-encoder=libaom_av1 \
            --enable-encoder=libsvtav1 \
            \
            --enable-libopus \
            --enable-encoder=libopus \
            --enable-encoder=aac \
            --enable-encoder=flac \
            --enable-encoder=alac \
            --enable-encoder=pcm_s16le \
            --enable-encoder=pcm_s24le \
            --enable-encoder=pcm_f32le \
            \
            --enable-decoder=h264 \
            --enable-decoder=hevc \
            --enable-decoder=vp8 \
            --enable-decoder=vp9 \
            --enable-decoder=av1 \
            --enable-decoder=mpeg4 \
            --enable-decoder=mpeg2video \
            --enable-decoder=mjpeg \
            --enable-decoder=aac \
            --enable-decoder=mp3 \
            --enable-decoder=ac3 \
            --enable-decoder=eac3 \
            --enable-decoder=opus \
            --enable-decoder=vorbis \
            --enable-decoder=flac \
            --enable-decoder=alac \
            --enable-decoder=pcm_s16le \
            --enable-decoder=pcm_s24le \
            --enable-decoder=pcm_f32le \
            \
            --disable-sdl2 \
            --disable-vulkan \
            --disable-opencl \
            \
            --extra-libs="$AOM_LIBS $OPUS_LIBS $SVT_AV1_LIBS" \
            --extra-cflags="-I$DEPS_PREFIX/include" \
            --extra-ldflags="-L$DEPS_PREFIX/lib -static -static-libgcc -static-libstdc++" \
          || {
            echo "❌ FFmpeg configure failed!"
            echo "=== last 100 lines of config.log ==="
            tail -n 100 ffbuild/config.log
            exit 1
          }

          make -j"$(nproc)"
          make install

      - name: Verify build (static, encoders/decoders present, LGPL)
        run: |
          set -euxo pipefail
          FF="$INSTALL_PREFIX/bin/ffmpeg.exe"

          echo "=== no third-party DLL imports (fully static) ==="
          x86_64-w64-mingw32-objdump -p "$FF" | grep "DLL Name" | sort -u
          if x86_64-w64-mingw32-objdump -p "$FF" | grep -Ei "libgcc|libstdc|libwinpthread|libaom|libopus|SvtAv1|avcodec|avformat"; then
            echo "❌ Non-system DLL dependency found — build is not fully static"; exit 1
          fi
          echo "✅ No third-party DLL dependencies"

          echo "=== ffmpeg -version (via wine) ==="
          wine64 "$FF" -hide_banner -version

          echo "=== encoders (expect AV1 + AAC/Opus/FLAC/ALAC/PCM) ==="
          wine64 "$FF" -hide_banner -encoders | grep -E "libaom_av1|libsvtav1|libopus| aac | flac | alac |pcm_s16le|pcm_s24le|pcm_f32le"

          echo "=== decoders (expect video + audio input codecs) ==="
          wine64 "$FF" -hide_banner -decoders | grep -E " h264 | hevc | vp9 | av1 | aac | mp3 | ac3 | opus | vorbis | flac "

          echo "=== license gate: no GPL / nonfree / version3 ==="
          ! wine64 "$FF" -hide_banner -buildconf | grep -q -- "--enable-gpl"
          ! wine64 "$FF" -hide_banner -buildconf | grep -q -- "--enable-nonfree"
          ! wine64 "$FF" -hide_banner -buildconf | grep -q -- "--enable-version3"
          echo "✅ LGPL v2.1 gate passed"

      - name: Package artifact (ffmpeg.exe + ffprobe.exe)
        run: |
          set -euxo pipefail
          cd "$INSTALL_PREFIX/bin"
          zip -j "$INSTALL_PREFIX/ffmpeg-windows-x86_64-lgpl-clean-audio.zip" ffmpeg.exe ffprobe.exe
          unzip -l "$INSTALL_PREFIX/ffmpeg-windows-x86_64-lgpl-clean-audio.zip"
          ls -lh "$INSTALL_PREFIX/ffmpeg-windows-x86_64-lgpl-clean-audio.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows-x86_64-lgpl-clean-audio
          path: ${{ env.INSTALL_PREFIX }}/ffmpeg-windows-x86_64-lgpl-clean-audio.zip
